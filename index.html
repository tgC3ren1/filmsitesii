<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HDFlim — Film İzle</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --bg2: #111118;
    --bg3: #18181f;
    --card: #14141c;
    --border: #ffffff0f;
    --accent: #e63946;
    --accent2: #ff6b6b;
    --gold: #ffd166;
    --text: #f0f0f5;
    --muted: #888899;
    --radius: 10px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior: smooth; }
  body { background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; min-height:100vh; }

  /* NAVBAR */
  nav {
    position:fixed; top:0; left:0; right:0; z-index:100;
    background:linear-gradient(to bottom, rgba(10,10,15,0.98), transparent);
    padding:0 32px;
    display:flex; align-items:center; justify-content:space-between;
    height:64px;
    backdrop-filter:blur(8px);
    border-bottom:1px solid var(--border);
  }
  .logo { font-family:'Bebas Neue',sans-serif; font-size:28px; color:var(--accent); letter-spacing:2px; cursor:pointer; }
  .logo span { color:var(--text); }
  .search-wrap { position:relative; }
  .search-wrap input {
    background:var(--bg3); border:1px solid var(--border);
    color:var(--text); padding:8px 16px 8px 40px;
    border-radius:50px; font-size:14px; width:260px;
    outline:none; transition:all .2s;
  }
  .search-wrap input:focus { border-color:var(--accent); width:300px; }
  .search-wrap svg { position:absolute; left:12px; top:50%; transform:translateY(-50%); opacity:.4; }
  .nav-count { font-size:12px; color:var(--muted); }

  /* HERO */
  .hero {
    margin-top:64px;
    padding:60px 32px 40px;
    background:linear-gradient(135deg, #0a0a0f 0%, #1a0a12 50%, #0a0a0f 100%);
    position:relative; overflow:hidden;
  }
  .hero::before {
    content:''; position:absolute; inset:0;
    background:radial-gradient(ellipse 60% 80% at 70% 50%, rgba(230,57,70,0.08), transparent);
    pointer-events:none;
  }
  .hero h1 { font-family:'Bebas Neue',sans-serif; font-size:clamp(40px,6vw,80px); line-height:1; margin-bottom:8px; }
  .hero h1 span { color:var(--accent); }
  .hero p { color:var(--muted); font-size:15px; max-width:500px; }

  /* FILTERS */
  .filters {
    padding:20px 32px;
    display:flex; gap:10px; flex-wrap:wrap;
    border-bottom:1px solid var(--border);
    background:var(--bg);
    position:sticky; top:64px; z-index:90;
  }
  .filter-btn {
    padding:6px 16px; border-radius:50px;
    border:1px solid var(--border);
    background:transparent; color:var(--muted);
    font-size:13px; cursor:pointer; transition:all .2s;
    font-family:'Inter',sans-serif;
  }
  .filter-btn:hover, .filter-btn.active {
    background:var(--accent); border-color:var(--accent);
    color:#fff;
  }

  /* GRID */
  .section { padding:32px; }
  .section-title {
    font-family:'Bebas Neue',sans-serif;
    font-size:22px; letter-spacing:1px;
    color:var(--muted); margin-bottom:20px;
    display:flex; align-items:center; gap:10px;
  }
  .section-title::after { content:''; flex:1; height:1px; background:var(--border); }
  .grid {
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap:16px;
  }

  /* CARD */
  .card {
    background:var(--card); border-radius:var(--radius);
    border:1px solid var(--border);
    overflow:hidden; cursor:pointer;
    transition:transform .2s, border-color .2s, box-shadow .2s;
    position:relative;
  }
  .card:hover {
    transform:translateY(-4px) scale(1.01);
    border-color:var(--accent);
    box-shadow:0 12px 40px rgba(230,57,70,0.2);
  }
  .card-poster {
    width:100%; aspect-ratio:2/3;
    object-fit:cover; display:block;
    background:var(--bg3);
  }
  .card-poster-placeholder {
    width:100%; aspect-ratio:2/3;
    background:linear-gradient(135deg, var(--bg3), var(--bg2));
    display:flex; align-items:center; justify-content:center;
    font-size:40px; color:var(--border);
  }
  .card-overlay {
    position:absolute; inset:0;
    background:linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 50%);
    opacity:0; transition:opacity .2s;
    display:flex; align-items:center; justify-content:center;
  }
  .card:hover .card-overlay { opacity:1; }
  .play-btn {
    width:52px; height:52px; border-radius:50%;
    background:var(--accent); border:none;
    display:flex; align-items:center; justify-content:center;
    color:#fff; cursor:pointer;
    transform:scale(0.8); transition:transform .2s;
  }
  .card:hover .play-btn { transform:scale(1); }
  .card-info { padding:10px 12px 12px; }
  .card-title { font-size:13px; font-weight:600; line-height:1.3; margin-bottom:4px; }
  .card-meta { font-size:11px; color:var(--muted); display:flex; gap:6px; }
  .badge {
    display:inline-flex; align-items:center; gap:3px;
    font-size:10px; padding:2px 7px; border-radius:4px;
    font-weight:600;
  }
  .badge-hd { background:rgba(255,209,102,0.15); color:var(--gold); }
  .badge-play { background:rgba(230,57,70,0.2); color:var(--accent2); }
  .no-player { opacity:0.45; }

  /* MODAL */
  .modal-bg {
    position:fixed; inset:0; z-index:1000;
    background:rgba(0,0,0,0.92);
    display:none; align-items:center; justify-content:center;
    padding:20px;
    backdrop-filter:blur(6px);
  }
  .modal-bg.open { display:flex; }
  .modal {
    background:var(--bg2); border-radius:14px;
    border:1px solid var(--border);
    width:100%; max-width:900px;
    max-height:90vh; overflow-y:auto;
    position:relative;
    animation:modalIn .25s ease;
  }
  @keyframes modalIn { from { transform:scale(.95); opacity:0; } to { transform:scale(1); opacity:1; } }
  .modal-close {
    position:absolute; top:14px; right:14px;
    background:var(--bg3); border:1px solid var(--border);
    color:var(--text); width:36px; height:36px; border-radius:50%;
    cursor:pointer; font-size:18px; z-index:10;
    display:flex; align-items:center; justify-content:center;
    transition:background .2s;
  }
  .modal-close:hover { background:var(--accent); border-color:var(--accent); }
  .modal-player {
    width:100%; aspect-ratio:16/9;
    background:#000; border-radius:14px 14px 0 0; overflow:hidden;
  }
  .modal-player iframe { width:100%; height:100%; border:none; }
  .modal-body { padding:20px 24px 24px; }
  .modal-title { font-family:'Bebas Neue',sans-serif; font-size:28px; margin-bottom:6px; }
  .modal-meta { color:var(--muted); font-size:13px; margin-bottom:16px; display:flex; gap:12px; flex-wrap:wrap; }
  .source-btns { display:flex; gap:8px; flex-wrap:wrap; }
  .source-btn {
    padding:7px 16px; border-radius:6px; font-size:13px;
    border:1px solid var(--border); background:var(--bg3);
    color:var(--muted); cursor:pointer; transition:all .15s;
    font-family:'Inter',sans-serif;
  }
  .source-btn:hover, .source-btn.active {
    background:var(--accent); border-color:var(--accent); color:#fff;
  }
  .modal-label { font-size:12px; color:var(--muted); margin:16px 0 8px; letter-spacing:.5px; text-transform:uppercase; }

  /* EMPTY */
  .empty { text-align:center; padding:60px 20px; color:var(--muted); }
  .empty-icon { font-size:48px; margin-bottom:12px; }

  /* FOOTER */
  footer {
    text-align:center; padding:32px;
    color:var(--muted); font-size:13px;
    border-top:1px solid var(--border);
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width:6px; }
  ::-webkit-scrollbar-track { background:var(--bg); }
  ::-webkit-scrollbar-thumb { background:var(--bg3); border-radius:3px; }

  @media(max-width:600px) {
    nav { padding:0 16px; }
    .hero { padding:40px 16px 24px; }
    .filters { padding:14px 16px; }
    .section { padding:20px 16px; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(130px,1fr)); gap:12px; }
    .search-wrap input { width:180px; }
  }
</style>
</head>
<body>

<nav>
  <div class="logo" onclick="closeModal();window.scrollTo(0,0)">HD<span>Flim</span></div>
  <div class="search-wrap">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="searchInput" placeholder="Film ara..." oninput="filterFilms()">
  </div>
  <div class="nav-count" id="navCount"></div>
</nav>

<div class="hero">

</div>

<div class="filters">

  <button class="filter-btn" onclick="setFilter('vidmoly',this)">Vidmoly</button>

</div>

<div class="section">

  <div class="grid" id="filmGrid"></div>
  <div class="empty" id="emptyMsg" style="display:none">
    <div class="empty-icon">🎬</div>
    <div>Film bulunamadı</div>
  </div>
</div>

<footer>
  HDFlim.net &copy; 2026 — Tüm hakları saklıdır.
</footer>

<!-- MODAL -->
<div class="modal-bg" id="modalBg" onclick="handleBgClick(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-player" id="modalPlayer"></div>
    <div class="modal-body">
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-meta" id="modalMeta"></div>
      <div id="sourcesWrap" style="display:none">
        <div class="modal-label">Kaynak Seç</div>
        <div class="source-btns" id="sourceBtns"></div>
      </div>
    </div>
  </div>
</div>

  if (url.includes('youtube')) return '▶ YouTube';
  if (url.includes('mail.ru')) return '📺 Mail.ru';
  if (url.includes('ok.ru') || url.includes('odnoklassniki')) return '📺 OK.ru';
  if (url.includes('dzen.ru')) return '📺 Dzen';
  return '📺 Kaynak';
}

function filteredFilms() {
  return VALID_FILMS.filter(f => {
    const matchSearch = !currentSearch || f.title.toLowerCase().includes(currentSearch.toLowerCase());
    const matchFilter =
      currentFilter === 'all' ? true :
      currentFilter === 'player' ? !!f.player :
      currentFilter === 'vidmoly' ? f.embeds.some(e => e.includes('vidmoly')) :
      currentFilter === 'youtube' ? f.embeds.some(e => e.includes('youtube')) :
      true;
    return matchSearch && matchFilter;
  });
}

function renderGrid() {
  const films = filteredFilms();
  const grid = document.getElementById('filmGrid');
  const empty = document.getElementById('emptyMsg');
  const title = document.getElementById('gridTitle');
  const navCount = document.getElementById('navCount');

  navCount.textContent = `${films.length} film`;
  title.textContent = currentSearch ? `"${currentSearch}" için sonuçlar` :
    currentFilter === 'all' ? 'Tüm Filmler' :
    currentFilter === 'player' ? 'İzlenebilir Filmler' :
    currentFilter === 'vidmoly' ? 'Vidmoly Filmleri' : 'YouTube Filmleri';

  if (!films.length) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  grid.innerHTML = films.map((f, i) => {
    const hasPlayer = !!f.player;
    const posterHtml = f.poster
      ? `<img class="card-poster" src="${f.poster}" alt="${f.title}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
      : '';
    const placeholderStyle = f.poster ? 'display:none' : '';
    return `
    <div class="card ${!hasPlayer ? 'no-player' : ''}" onclick="${hasPlayer ? `openFilm(${i})` : ''}" title="${f.title}">
      ${posterHtml}
      <div class="card-poster-placeholder" style="${placeholderStyle}">🎬</div>
      <div class="card-overlay">
        <button class="play-btn">
          <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </button>
      </div>
      <div class="card-info">
        <div class="card-title">${f.title}</div>
        <div class="card-meta">
          ${hasPlayer ? '<span class="badge badge-play">▶ İzle</span>' : '<span class="badge" style="opacity:.4">Yakında</span>'}
          <span class="badge badge-hd">HD</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

function openFilm(globalIdx) {
  const films = filteredFilms();
  // Find actual film from filtered
  const f = films[globalIdx] || VALID_FILMS[globalIdx];
  if (!f || !f.player) return;

  document.getElementById('modalTitle').textContent = f.title;
  document.getElementById('modalMeta').innerHTML = `
    <span>🎬 HD Kalite</span>
    <span>📺 ${f.embeds.length} kaynak</span>
    ${f.trailer ? '<span>🎞 Fragman mevcut</span>' : ''}
  `;

  setModalSrc(f.player, f);

  // Source buttons
  const sourcesWrap = document.getElementById('sourcesWrap');
  const sourceBtns = document.getElementById('sourceBtns');
  const validEmbeds = f.embeds.filter(e => e && e.startsWith('http'));
  if (validEmbeds.length > 1) {
    sourcesWrap.style.display = 'block';
    sourceBtns.innerHTML = validEmbeds.map((e, i) =>
      `<button class="source-btn ${i===0?'active':''}" onclick="switchSource('${e}', this)">${getSourceLabel(e)}</button>`
    ).join('');
  } else {
    sourcesWrap.style.display = 'none';
  }

  document.getElementById('modalBg').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function setModalSrc(src, film) {
  document.getElementById('modalPlayer').innerHTML =
    `<iframe src="${src}" allowfullscreen allow="autoplay; encrypted-media" referrerpolicy="no-referrer"></iframe>`;
}

function switchSource(src, btn) {
  document.querySelectorAll('.source-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('modalPlayer').innerHTML =
    `<iframe src="${src}" allowfullscreen allow="autoplay; encrypted-media" referrerpolicy="no-referrer"></iframe>`;
}

function closeModal() {
  document.getElementById('modalBg').classList.remove('open');
  document.getElementById('modalPlayer').innerHTML = '';
  document.body.style.overflow = '';
}

function handleBgClick(e) {
  if (e.target === document.getElementById('modalBg')) closeModal();
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

function filterFilms() {
  currentSearch = document.getElementById('searchInput').value;
  renderGrid();
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});
