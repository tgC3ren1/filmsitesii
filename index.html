<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HD Film İzle</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0a0f;--bg2:#111118;--bg3:#18181f;--card:#14141c;--border:#ffffff0f;
    --accent:#e63946;--accent2:#ff6b6b;--gold:#ffd166;--text:#f0f0f5;--muted:#888899;--radius:10px;}
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;}

  nav{position:fixed;top:0;left:0;right:0;z-index:200;background:rgba(10,10,15,0.97);
    padding:0 28px;display:flex;align-items:center;justify-content:space-between;
    height:62px;border-bottom:1px solid var(--border);backdrop-filter:blur(10px);}
  .logo img{height:42px;object-fit:contain;cursor:pointer;}
  .search-wrap{position:relative;}
  .search-wrap input{background:var(--bg3);border:1px solid var(--border);color:var(--text);
    padding:8px 16px 8px 38px;border-radius:50px;font-size:13px;width:240px;outline:none;transition:all .2s;}
  .search-wrap input:focus{border-color:var(--accent);width:280px;}
  .search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);opacity:.4;}
  .nav-count{font-size:12px;color:var(--muted);}

  .hero{margin-top:62px;padding:40px 28px 28px;
    background:linear-gradient(135deg,#0a0a0f 0%,#1a0a12 50%,#0a0a0f 100%);position:relative;overflow:hidden;}
  .hero::before{content:'';position:absolute;inset:0;
    background:radial-gradient(ellipse 60% 80% at 70% 50%,rgba(230,57,70,0.07),transparent);pointer-events:none;}
  .hero-inner{display:flex;align-items:center;gap:18px;}
  .hero-logo{height:56px;object-fit:contain;}
  .hero-text h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(28px,5vw,60px);line-height:1;}
  .hero-text h1 span{color:var(--accent);}
  .hero-text p{color:var(--muted);font-size:13px;margin-top:4px;}

  .cat-nav{background:var(--bg2);border-bottom:1px solid var(--border);
    position:sticky;top:62px;z-index:150;overflow-x:auto;white-space:nowrap;
    padding:0 20px;display:flex;gap:0;align-items:center;}
  .cat-nav::-webkit-scrollbar{height:3px;}
  .cat-nav::-webkit-scrollbar-thumb{background:var(--border);}
  .cat-btn{display:inline-flex;align-items:center;gap:5px;padding:14px 14px;
    border:none;background:none;color:var(--muted);font-size:13px;
    cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;
    font-family:'Inter',sans-serif;white-space:nowrap;}
  .cat-btn:hover{color:var(--text);}
  .cat-btn.active{color:var(--accent);border-bottom-color:var(--accent);}

  .search-bar{padding:14px 28px;background:var(--bg);}
  .search-bar input{width:100%;background:var(--bg3);border:1px solid var(--border);
    color:var(--text);padding:10px 18px;border-radius:8px;font-size:14px;outline:none;transition:border .2s;}
  .search-bar input:focus{border-color:var(--accent);}

  .section{padding:22px 28px 32px;}
  .section-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;
    color:var(--muted);margin-bottom:18px;display:flex;align-items:center;gap:10px;}
  .section-title span{color:var(--text);}
  .section-title::after{content:'';flex:1;height:1px;background:var(--border);}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;}

  .card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);
    overflow:hidden;cursor:pointer;transition:transform .2s,border-color .2s,box-shadow .2s;position:relative;}
  .card:hover{transform:translateY(-4px);border-color:var(--accent);box-shadow:0 12px 32px rgba(230,57,70,0.18);}
  .card.no-player{opacity:.45;cursor:default;}
  .card-poster{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;background:var(--bg3);}
  .card-ph{width:100%;aspect-ratio:2/3;background:linear-gradient(135deg,var(--bg3),var(--bg2));
    display:flex;align-items:center;justify-content:center;font-size:36px;color:var(--border);}
  .card-overlay{position:absolute;inset:0;
    background:linear-gradient(to top,rgba(0,0,0,0.88) 0%,transparent 55%);
    opacity:0;transition:opacity .2s;display:flex;align-items:center;justify-content:center;}
  .card:hover:not(.no-player) .card-overlay{opacity:1;}
  .play-btn{width:50px;height:50px;border-radius:50%;background:var(--accent);border:none;
    display:flex;align-items:center;justify-content:center;color:#fff;
    transform:scale(.8);transition:transform .2s;pointer-events:none;}
  .card:hover .play-btn{transform:scale(1);}
  .cat-badge{position:absolute;top:7px;left:7px;font-size:9px;padding:2px 7px;
    border-radius:4px;font-weight:700;background:rgba(0,0,0,0.75);backdrop-filter:blur(4px);}
  .card-info{padding:9px 11px 11px;}
  .card-title{font-size:12px;font-weight:600;line-height:1.35;margin-bottom:5px;}
  .card-meta{display:flex;gap:5px;flex-wrap:wrap;}
  .badge{display:inline-flex;align-items:center;gap:2px;font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600;}
  .badge-hd{background:rgba(255,209,102,0.15);color:var(--gold);}
  .badge-play{background:rgba(230,57,70,0.2);color:var(--accent2);}
  .badge-cat{background:rgba(255,255,255,0.07);color:var(--muted);}

  /* MODAL */
  .modal-bg{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.94);
    display:none;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(8px);}
  .modal-bg.open{display:flex;}
  .modal{background:var(--bg2);border-radius:14px;border:1px solid var(--border);
    width:100%;max-width:900px;max-height:92vh;overflow-y:auto;position:relative;
    animation:mIn .22s ease;}
  @keyframes mIn{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
  .modal-close{position:absolute;top:12px;right:12px;background:var(--bg3);
    border:1px solid var(--border);color:var(--text);width:34px;height:34px;border-radius:50%;
    cursor:pointer;font-size:16px;z-index:60;display:flex;align-items:center;justify-content:center;transition:background .15s;}
  .modal-close:hover{background:var(--accent);border-color:var(--accent);}

  .modal-player{width:100%;aspect-ratio:16/9;background:#000;border-radius:14px 14px 0 0;overflow:hidden;position:relative;}
  .modal-player iframe{width:100%;height:100%;border:none;display:block;}

  /* AD */
  .ad-overlay{position:absolute;inset:0;background:#000;z-index:50;
    display:flex;flex-direction:column;align-items:stretch;justify-content:center;}
  .ad-overlay video{width:100%;height:100%;object-fit:contain;cursor:pointer;display:block;}
  .ad-top-bar{position:absolute;top:0;left:0;right:0;z-index:52;
    display:flex;justify-content:space-between;align-items:center;
    padding:8px 14px;background:linear-gradient(to bottom,rgba(0,0,0,0.7),transparent);}
  .ad-label{font-size:11px;color:rgba(255,255,255,0.6);background:rgba(0,0,0,0.5);
    padding:3px 8px;border-radius:4px;}
  .ad-countdown{font-size:11px;color:#fff;background:rgba(0,0,0,0.6);padding:3px 10px;border-radius:4px;}
  .ad-skip{position:absolute;bottom:14px;right:14px;z-index:52;
    padding:8px 20px;border-radius:6px;font-size:13px;border:none;cursor:not-allowed;
    background:rgba(255,255,255,0.15);color:rgba(255,255,255,0.5);
    font-family:'Inter',sans-serif;transition:all .2s;}
  .ad-skip.ready{background:var(--accent);color:#fff;cursor:pointer;}

  .modal-body{padding:18px 22px 22px;}
  .modal-title{font-family:'Bebas Neue',sans-serif;font-size:26px;margin-bottom:5px;}
  .modal-meta{color:var(--muted);font-size:12px;margin-bottom:14px;display:flex;gap:10px;flex-wrap:wrap;}
  .source-label{font-size:11px;color:var(--muted);margin:14px 0 8px;letter-spacing:.5px;text-transform:uppercase;}
  .source-btns{display:flex;gap:8px;flex-wrap:wrap;}
  .source-btn{padding:6px 14px;border-radius:6px;font-size:12px;border:1px solid var(--border);
    background:var(--bg3);color:var(--muted);cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif;}
  .source-btn:hover,.source-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}

  .empty{text-align:center;padding:60px 20px;color:var(--muted);}
  .empty-icon{font-size:48px;margin-bottom:12px;}
  footer{text-align:center;padding:28px;color:var(--muted);font-size:12px;border-top:1px solid var(--border);}
  ::-webkit-scrollbar{width:5px;}
  ::-webkit-scrollbar-track{background:var(--bg);}
  ::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px;}

  @media(max-width:600px){
    nav{padding:0 14px;}
    .hero,.search-bar,.section{padding-left:14px;padding-right:14px;}
    .cat-nav{padding:0 10px;}
    .grid{grid-template-columns:repeat(auto-fill,minmax(128px,1fr));gap:10px;}
    .search-wrap{display:none;}
    .nav-count{display:none;}
  }
</style>
</head>
<body>

<nav>
  <div class="logo" onclick="setCategory('all')">
    <img src="https://i.hizliresim.com/s6bt9bj.png" alt="Logo">
  </div>
  <div class="search-wrap">
    <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input type="text" id="searchNav" placeholder="Film ara..." oninput="doSearch(this.value)">
  </div>
  <div class="nav-count" id="navCount"></div>
</nav>

<div class="hero">
  <div class="hero-inner">
    <img class="hero-logo" src="https://i.hizliresim.com/s6bt9bj.png" alt="Logo" onerror="this.style.display='none'">
    <div class="hero-text">
      <h1>HD FİLM <span>İZLE</span></h1>
      <p>Türkçe dublaj ve altyazılı filmler, HD kalitede.</p>
    </div>
  </div>
</div>

<div class="cat-nav">
  <button class="cat-btn active" data-cat="all"      onclick="setCategory('all',this)">🎬 Tümü</button>
  <button class="cat-btn" data-cat="aksiyon"         onclick="setCategory('aksiyon',this)">💥 Aksiyon</button>
  <button class="cat-btn" data-cat="korku"           onclick="setCategory('korku',this)">👻 Korku</button>
  <button class="cat-btn" data-cat="komedi"          onclick="setCategory('komedi',this)">😂 Komedi</button>
  <button class="cat-btn" data-cat="romantik"        onclick="setCategory('romantik',this)">💕 Romantik</button>
  <button class="cat-btn" data-cat="drama"           onclick="setCategory('drama',this)">🎭 Drama</button>
  <button class="cat-btn" data-cat="bilimkurgu"      onclick="setCategory('bilimkurgu',this)">🚀 Bilim Kurgu</button>
  <button class="cat-btn" data-cat="yerli"           onclick="setCategory('yerli',this)">🇹🇷 Yerli</button>
  <button class="cat-btn" data-cat="erotik"          onclick="setCategory('erotik',this)">🔞 Yetişkin</button>
</div>

<div class="search-bar">
  <input type="text" id="searchMain" placeholder="🔍  Film ara..." oninput="doSearch(this.value)">
</div>

<div class="section">
  <div class="section-title" id="secTitle"><span>Tüm Filmler</span></div>
  <div class="grid" id="filmGrid"></div>
  <div class="empty" id="emptyMsg" style="display:none">
    <div class="empty-icon">🎬</div><div>Film bulunamadı</div>
  </div>
</div>

<footer>HD Film İzle &copy; 2026 — Tüm hakları saklıdır.</footer>

<!-- MODAL -->
<div class="modal-bg" id="modalBg" onclick="bgClick(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-player" id="modalPlayer">
      <div class="ad-overlay" id="adOverlay">
        <div class="ad-top-bar">
          <span class="ad-label">📢 Reklam</span>
          <span class="ad-countdown" id="adCountdown">15</span>
        </div>
        <video id="adVideo" playsinline autoplay muted>
          <source src="https://zbhpay.com/cokpardon.mp4" type="video/mp4">
        </video>
        <button class="ad-skip" id="adSkip" disabled>15 sn sonra geçilebilir</button>
      </div>
    </div>
    <div class="modal-body">
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-meta" id="modalMeta"></div>
      <div id="sourcesWrap" style="display:none">
        <div class="source-label">Kaynak Seç</div>
        <div class="source-btns" id="sourceBtns"></div>
      </div>
    </div>
  </div>
</div>

const CAT_NAMES = {
  all:"Tüm Filmler",aksiyon:"💥 Aksiyon",korku:"👻 Korku",komedi:"😂 Komedi",
  romantik:"💕 Romantik",drama:"🎭 Drama",bilimkurgu:"🚀 Bilim Kurgu",
  yerli:"🇹🇷 Yerli",erotik:"🔞 Yetişkin"
};
const CAT_COLORS = {
  aksiyon:"#e63946",korku:"#9b59b6",komedi:"#f39c12",romantik:"#e91e8c",
  drama:"#2980b9",bilimkurgu:"#00bcd4",yerli:"#c0392b",erotik:"#c9184a"
};
const SRC_LABEL = u => {
  if(!u) return '';
  if(u.includes('vidmoly')) return '🎬 Vidmoly';
  if(u.includes('youtube')) return '▶ YouTube';
  if(u.includes('mail.ru')) return '📺 Mail.ru';
  if(u.includes('ok.ru')||u.includes('odnoklassniki')) return '📺 OK.ru';
  if(u.includes('dzen')) return '📺 Dzen';
  return '📺 Kaynak';
};

let currentCat='all', currentSearch='', adInterval=null, pendingSrc='';
const AD_URL='https://zbhpay.com/cokpardon.mp4';
const AD_LINK='https://cutt.ly/otHVumfr';
const AD_SECS=15;

function getFilms() {
  return FILMS.filter(f => {
    const mc = currentCat==='all' || f.cat===currentCat;
    const ms = !currentSearch || f.t.toLowerCase().includes(currentSearch.toLowerCase());
    return mc && ms;
  });
}

function render() {
  const films = getFilms();
  const grid = document.getElementById('filmGrid');
  const empty = document.getElementById('emptyMsg');
  document.getElementById('navCount').textContent = films.length+' film';
  document.getElementById('secTitle').innerHTML =
    `<span>${currentSearch?'"'+currentSearch+'" için sonuçlar':CAT_NAMES[currentCat]}</span>`;

  if(!films.length){ grid.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display='none';

  grid.innerHTML = films.map((f,i) => {
    const hasV = !!f.v;
    const col = CAT_COLORS[f.cat]||'#888';
    const imgHTML = f.p
      ? `<img class="card-poster" src="${f.p}" alt="${f.t}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
      : '';
    const phStyle = f.p ? 'display:none' : '';
    return `<div class="card${hasV?'':' no-player'}" ${hasV?`onclick="open_film(${i})"`:''}">
      ${imgHTML}
      <div class="card-ph" style="${phStyle}">🎬</div>
      <span class="cat-badge" style="color:${col}">${CAT_NAMES[f.cat]||''}</span>
      <div class="card-overlay"><button class="play-btn">
        <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </button></div>
      <div class="card-info">
        <div class="card-title">${f.t}</div>
        <div class="card-meta">
          ${hasV?'<span class="badge badge-play">▶ İzle</span>':'<span class="badge badge-cat">Yakında</span>'}
          <span class="badge badge-hd">HD</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

function setCategory(cat, btn) {
  currentCat = cat; currentSearch = '';
  document.getElementById('searchNav').value='';
  document.getElementById('searchMain').value='';
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  (btn||document.querySelector('[data-cat="all"]')).classList.add('active');
  render();
}

function doSearch(v) {
  currentSearch = v;
  document.getElementById('searchNav').value = v;
  document.getElementById('searchMain').value = v;
  if(v){ currentCat='all'; document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active')); document.querySelector('[data-cat="all"]').classList.add('active'); }
  render();
}

function open_film(i) {
  const f = getFilms()[i];
  if(!f||!f.v) return;
  document.getElementById('modalTitle').textContent = f.t;
  document.getElementById('modalMeta').innerHTML =
    `<span>🎬 HD Kalite</span><span>${CAT_NAMES[f.cat]||''}</span><span>📺 ${f.e.length} kaynak</span>`;

  const valid = f.e.filter(e=>e&&e.startsWith('http'));
  const sw = document.getElementById('sourcesWrap');
  if(valid.length>1){
    sw.style.display='block';
    document.getElementById('sourceBtns').innerHTML = valid.map((e,idx)=>
      `<button class="source-btn${idx===0?' active':''}" onclick="switchSrc('${e}',this)">${SRC_LABEL(e)}</button>`
    ).join('');
  } else { sw.style.display='none'; }

  pendingSrc = f.v;
  playAd();
  document.getElementById('modalBg').classList.add('open');
  document.body.style.overflow='hidden';
}

function playAd() {
  clearInterval(adInterval);
  // Önceki iframe'leri temizle
  document.querySelectorAll('#modalPlayer iframe').forEach(el=>el.remove());
  const overlay = document.getElementById('adOverlay');
  const skip = document.getElementById('adSkip');
  const cd = document.getElementById('adCountdown');
  const vid = document.getElementById('adVideo');

  overlay.style.display='flex';
  skip.disabled = true;
  skip.className = 'ad-skip';
  skip.textContent = `${AD_SECS} sn sonra geçilebilir`;
  cd.textContent = AD_SECS+'sn';
  vid.onclick = ()=>window.open(AD_LINK,'_blank');
  vid.currentTime=0; vid.muted=false;
  vid.play().catch(()=>{ vid.muted=true; vid.play(); });

  let rem = AD_SECS;
  adInterval = setInterval(()=>{
    rem--;
    cd.textContent = rem+'sn';
    if(rem<=0){
      clearInterval(adInterval);
      skip.disabled=false;
      skip.className='ad-skip ready';
      skip.textContent='Geç →';
      skip.onclick = skipAd;
    } else {
      skip.textContent = `${rem} sn sonra geçilebilir`;
    }
  },1000);
}

function skipAd() {
  clearInterval(adInterval);
  const vid = document.getElementById('adVideo');
  vid.pause();
  document.getElementById('adOverlay').style.display='none';
  const iframe = document.createElement('iframe');
  iframe.src = pendingSrc;
  iframe.setAttribute('allowfullscreen','');
  iframe.allow='autoplay; encrypted-media';
  iframe.referrerPolicy='no-referrer';
  iframe.style.cssText='width:100%;height:100%;border:none;display:block;';
  document.getElementById('modalPlayer').appendChild(iframe);
}

function switchSrc(src, btn) {
  document.querySelectorAll('.source-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  pendingSrc = src;
  playAd();
}

function closeModal() {
  clearInterval(adInterval);
  document.getElementById('modalBg').classList.remove('open');
  document.body.style.overflow='';
  document.querySelectorAll('#modalPlayer iframe').forEach(el=>el.remove());
  const vid = document.getElementById('adVideo');
  vid.pause(); vid.currentTime=0;
  document.getElementById('adOverlay').style.display='flex';
  document.getElementById('adSkip').disabled=true;
  document.getElementById('adSkip').className='ad-skip';
  document.getElementById('adSkip').textContent=`${AD_SECS} sn sonra geçilebilir`;
  document.getElementById('adCountdown').textContent=AD_SECS+'sn';
}

function bgClick(e){ if(e.target===document.getElementById('modalBg')) closeModal(); }
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });

render();
</script>
